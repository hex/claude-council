name: tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  bats:
    name: bats (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y bats jq

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install bats-core jq

      # macOS runners ship bash 3.2 as /bin/bash — the plugin's compat target.
      - name: Show bash version
        run: /bin/bash --version | head -1

      - name: Run bats suite
        run: bash tests/run_tests.sh

  shellcheck:
    name: shellcheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # A linter ships new checks in every release, so an unpinned one reddens
      # main on a commit nobody touched. This job blocks a merge, so it is pinned
      # by digest: the tag names a release, only the hash names the bytes.
      # Bump both deliberately, with the tree clean. bats needs no pin — a test
      # runner does not invent assertions between releases.
      - name: Install shellcheck
        env:
          SHELLCHECK_VERSION: v0.11.0
          SHELLCHECK_SHA256: 8c3be12b05d5c177a04c29e3c78ce89ac86f1595681cab149b65b97c4e227198
        run: |
          # Retry into a file, never a pipe: curl restarts a transfer from byte
          # zero but cannot unwrite what it already emitted, so a retried pipe
          # hands tar a corrupted stream.
          curl -fsSL --retry 3 --retry-delay 2 --retry-all-errors -o shellcheck.tar.xz \
            "https://github.com/koalaman/shellcheck/releases/download/${SHELLCHECK_VERSION}/shellcheck-${SHELLCHECK_VERSION}.linux.x86_64.tar.xz"
          echo "${SHELLCHECK_SHA256}  shellcheck.tar.xz" | sha256sum -c -
          sudo tar -xJf shellcheck.tar.xz --strip-components=1 -C /usr/local/bin \
            "shellcheck-${SHELLCHECK_VERSION}/shellcheck"
          rm -f shellcheck.tar.xz
          shellcheck --version

      # Every tracked script, so a new directory cannot slip past a blocking gate.
      # Reads .shellcheckrc from the repo root, which lets it follow our sourced libs.
      - name: Lint shell scripts
        run: git ls-files '*.sh' | xargs shellcheck
