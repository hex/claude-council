name: tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  bats:
    name: bats (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y bats jq

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install bats-core jq

      # macOS runners ship bash 3.2 as /bin/bash — the plugin's compat target.
      - name: Show bash version
        run: /bin/bash --version | head -1

      - name: Run bats suite
        run: bash tests/run_tests.sh

  shellcheck:
    name: shellcheck (advisory)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck
      - name: Lint shell scripts
        run: shellcheck scripts/*.sh scripts/lib/*.sh scripts/providers/*.sh
